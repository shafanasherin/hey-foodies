<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Landing Page</title>
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
@import url('https://googleapis.com');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background-color: #ffffff;
    overflow-x: hidden;
}

.container {
    position: relative;
    width: 100%;
    min-height: 100vh;
    padding: 20px;
}

/* Hide the dark graphic block on mobile */
.dark-bg {
    display: none; 
}

/* Header & Nav */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 30px;
}

.left {
    margin: 20px;
    font-size: 24px;
    font-weight: 700;
    color: #111; /* Black text for white mobile background */
}

nav {
    display: none; /* Navigation hidden on mobile by default */
}

.header-icons {
    display: flex;
    align-items: center;
    gap: 15px;
}

.header-icons i {
    font-size: 18px;
    cursor: pointer;
    color: #333;
}

/* Hero Section */
.hero {
    display: flex;
    flex-direction: column; /* Stacked layout on mobile */
    align-items: center;
    text-align: center;
    gap: 30px;
    margin-bottom: 40px;
}

.hero-left {
    order: 1; /* Main image appears first on mobile */
}

.main-dish {
    width: 80%;
    max-width: 260px;
    height: auto;
    filter: drop-shadow(0px 15px 25px rgba(0,0,0,0.15));
}

.hero-right {
    order: 2;
}

.hero-right h1 {
    font-size: 34px;
    font-weight: 700;
    color: #111;
    text-transform: lowercase;
    margin-bottom: 15px;
}

.hero-right p {
    color: #666;
    font-size: 14px;
    line-height: 1.6;
    margin: 0 auto 25px auto;
    max-width: 100%;
}

.price {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    font-size: 28px;
    font-weight: 700;
    color: #ff4d4d;
}

.Btn {
    background-color: #111;
    color: #fff;
    padding: 12px 30px;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
}

/* Bottom Cards Section */
.product {
    display: flex;
    flex-direction: column; /* Cards stacked vertically on mobile */
    gap: 15px;
    margin-bottom: 30px;
}

.card {
    background-color: #222;
    border-radius: 12px;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    color: #fff;
}

.card img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    object-fit: cover;
}

.card-info {
    flex: 1;
    padding-left: 15px;
}

.card-info h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
}

.price {
    font-size: 13px;
    color: #ff4d4d;
}

/* Footer Section */
footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
}

.dots {
    display: flex;
    gap: 8px;
}

.dot {
    width: 8px;
    height: 8px;
    background-color: #ddd;
    border-radius: 50%;
}

.dot.active {
    background-color: #ff4d4d;
    width: 20px;
    border-radius: 10px;
}

.social-icons {
    display: flex;
    gap: 25px;
}

.social-icons a {
    color: #666;
    font-size: 16px;
}

/* TABLET VIEW */ 
@media (min-width: 768px) {
    .container {
        padding: 30px 40px;
    }

    /* Unhide and style navigation for tablet */
    nav {
        display: flex;
        gap: 25px;
    }

    nav a {
        text-decoration: none;
        color: #333;
        font-weight: 500;
        font-size: 15px;
    }

    nav a.active {
        color: #59b305;
        position: relative;
    }

    nav a.active::before {
        content: '';
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 5px;
        height: 5px;
        background-color: #59b305;
        border-radius: 50%;
    }

    /* Switch cards to 2-column grid layout */
    .product {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 20px;
    }

    .card {
        width: 48%; 
    }

    footer {
        flex-direction: row;
        justify-content: space-between;
    }

    .dots {
        margin-left: auto;
        margin-right: auto;
    }
}

/* DESKTOP VIEW */
@media (min-width: 1024px) {
    .container {
        padding: 40px 80px;
    }

    /* Activate the split dark background on desktop */
    .dark-bg {
        margin-left: 80px;
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 370px;
        height: 500px;
        background-color: #111;
        z-index: -1;
    }

    .left {
        margin-left: 120px;
        font-size: 32px;
        color: #ffffff; /* Turns white over the dark background block */
        width: 320px; 
    }

    nav {
        margin-right: 20px;
        gap: 40px;
    }
    nav:hover {
        color: #59b305;
    }

    /* Switch to side-by-side split screen layout */
    .hero {
        flex-direction: row;
        text-align: left;
        justify-content: space-between;
        margin-bottom: 60px;
        gap: 0;
    }

    .hero-left {
        flex: 1;
        order: 1;
    }

    .main-dish {
        max-width: 440px;
        margin-left: 50px;
    }

    .hero-right {
        flex: 1;
        order: 2;
        padding-left: 40px;
    }

    .hero-right h1 {
        font-size: 54px;
        margin-bottom: 15px;
    }

    .hero-right p {
        font-size: 15px;
        margin: 0 0 30px 0;
        max-width: 500px;
    }

    .price {
        font-size: 32px;
        justify-content: flex-start;
        gap: 40px;
        color: #ff4d4d;
    }

    .Btn {
        padding: 14px 35px;
        font-size: 16px;
    }

    .Btn:hover {
        background-color: #59b305;
    }

    /* Display all 4 cards side-by-side in one row */
    .product {
        flex-wrap: nowrap;
        justify-content: space-between;
    }

    .card {
        width: 23%;
        margin: 20px;
    }

    .social-icons a:hover {
        color: #111;
        transition: color 0.3s;
    }
}

    
    </style>
</head>
<body>
    
    <div id="container">
        <div class="dark-bg"></div>
    <header>
        <div class="left">Hey! Foodies...</div>
        <div id="navigation">
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Service</a>
            <a href="#">Contact</a>
        </nav>
    <div class="icon">
        <i class="fas fa-shopping-cart"></i>
    </div>
    
    </div>
    </header>

    <section class="hero">
        
        <div class="hero-left">
        <img src="salad.png" alt="Salad" height="700" class="main-dish">
        </div>
        <div class="hero-right">
        <h1>Healthy Salad</h1>
        <p>Salad is nutritionally complete food that contains all 27 essential vitamins and minerals, protein, essential fatty acids, carbs, fibre and phytonutrients</p>
        <h3 class="price">₹120</h3>
        <button class="Btn">Order Now</button>
        </div>
    </section>

    <section class="product">
    <div class="card">
        <img src="Caesar-Salaad.jpg" alt="caesar salad" >
        <div class="card-info">
            <h3>Caesar Salad</h3>
            <h3>₹140</h3>
        </div>
    </div>

    <div class="card">
        <img src="avocado-citrus.jpg" alt="avocado citrus">
        <div class="card-info">
            <h3>Avocado Citrus Salad</h3>
            <h3>₹180</h3>
        </div>
    </div>

    <div class="card">
        <img src="burrata-salad.jpg" alt="burrata-salad">
        <div class="card-info">
            <h3>Burrata Salad</h3>
            <h3>₹220</h3>
        </div>
    </div>
    </section>

     <footer>
            <div class="dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-google"></i></a>
            </div>
        </footer>

    </div>
</body>
</html>
